<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mapa</title>
    <link rel="stylesheet" href="mappa.css">
</head>
<body>

    <div class="container">

        <!-- ICONOS SUPERIORES -->
        <div class="top-icons">
            <img src="no barreras arquitectonicas.png" alt="Mapa">
            <img src="no ruido .png" alt="Ruta">
            <img src="no perosnes .png" alt="Coche">
            <img src="icono de usario .jpg" alt="Usuario">
        </div>

        <!-- MAPA -->
        <div class="map-container">
            <iframe 
                src="https://www.google.com/maps?q=Sant%20Feliu%20de%20Llobregat&output=embed"
                allowfullscreen=""
                loading="lazy">
            </iframe>
        </div>

        <!-- ICONOS INFERIORES -->
        <div class="bottom-icons">
            <img src="casa.png" alt="Home" class="home-icon">
            <img src="icono guardar rutas .webp" alt="Guardar" class="save-icon">
        </div>

    </div>

</body>
</html>
